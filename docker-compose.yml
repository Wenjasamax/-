name: repair-service

services:
  app:
    build:
      context: ./repair-service
      dockerfile: Dockerfile
    container_name: repair-service-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: repair_service
      DB_USERNAME: user
      DB_PASSWORD: password
    volumes:
      - ./repair-service:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - repair-service

  nginx:
    image: nginx:alpine
    container_name: repair-service-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./repair-service:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - repair-service

  db:
    image: mysql:8.0
    container_name: repair-service-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: repair_service
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - repair-service

volumes:
  db_data:

networks:
  repair-service:
    driver: bridge